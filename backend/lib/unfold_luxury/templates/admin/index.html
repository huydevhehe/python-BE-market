{% extends "unfold/layouts/base.html" %}

{% load static %}

{% block content %}
    <div class="flex flex-col gap-y-8">
        <!-- KPI Cards Row -->
        <div class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4">
            {% for item in kpi %}
                <div class="rounded-xl border border-base-200 bg-white p-6 shadow-sm dark:border-base-800 dark:bg-base-900">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm font-medium text-base-500 dark:text-base-400">{{ item.title }}</p>
                            <h3 class="mt-1 text-2xl font-bold text-base-900 dark:text-white">{{ item.metric }}</h3>
                        </div>
                        <div class="flex h-12 w-12 items-center justify-center rounded-lg bg-primary-50 text-primary-600 dark:bg-primary-950 dark:text-primary-400">
                            <i data-lucide="{{ item.icon }}" class="h-6 w-6"></i>
                        </div>
                    </div>
                    <div class="mt-4 flex items-center gap-x-2">
                        <span class="text-xs text-base-500 dark:text-base-400">{{ item.footer }}</span>
                    </div>
                </div>
            {% endfor %}
        </div>

        <!-- Charts Section -->
        <div class="grid grid-cols-1 gap-8 lg:grid-cols-1">
            <div class="rounded-xl border border-base-200 bg-white p-6 shadow-sm dark:border-base-800 dark:bg-base-900">
                <div class="mb-6 flex items-center justify-between">
                    <h3 class="text-lg font-bold text-base-900 dark:text-white">Thống kê doanh thu (7 ngày qua)</h3>
                </div>
                <div class="h-64">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart.js Integration -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            
            // Get current theme color from CSS variables
            const getPrimaryColor = () => {
                const style = getComputedStyle(document.documentElement);
                const color = style.getPropertyValue('--chart-color').trim();
                return color || '#6366f1'; // Fallback to indigo
            };

            const primaryColor = getPrimaryColor();

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: {{ chart_labels|safe }},
                    datasets: [{
                        label: 'Doanh thu (VNĐ)',
                        data: {{ chart_data|safe }},
                        borderColor: primaryColor,
                        backgroundColor: primaryColor.replace('rgb', 'rgba').replace(')', ', 0.1)'),
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointBackgroundColor: primaryColor,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: '#94a3b8',
                                font: { family: 'Inter, sans-serif' }
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#94a3b8',
                                font: { family: 'Inter, sans-serif' },
                                callback: function(value) {
                                    return value.toLocaleString() + ' ₫';
                                }
                            }
                        }
                    }
                }
            });
            
            // Re-render chart when theme changes (if custom switcher is used)
            window.addEventListener('storage', (e) => {
               if (e.key === 'unfold-luxury-theme') location.reload();
            });
        });
    </script>
{% endblock %}
